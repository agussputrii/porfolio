<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agustín Putrino — IA Aplicada · On-Premise · LATAM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0a0a0a; color: #ededed; font-family: Inter, sans-serif; overflow-x: hidden; }
  .hl { color: #c4ff00; }

  /* ── ANIMATIONS ─────────────────────────── */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }

  .page-enter > * {
    animation: fadeSlideUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .page-enter > *:nth-child(1) { animation-delay: 0ms; }
  .page-enter > *:nth-child(2) { animation-delay: 60ms; }
  .page-enter > *:nth-child(3) { animation-delay: 110ms; }
  .page-enter > *:nth-child(4) { animation-delay: 150ms; }

  .detail-enter { animation: slideInRight 0.35s cubic-bezier(0.22,1,0.36,1) both; }

  /* ── NAV ────────────────────────────────── */
  .nav-item {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    padding: 8px 14px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .nav-item::after {
    content: '';
    position: absolute; bottom: 0; left: 14px; right: 14px; height: 1px;
    background: #c4ff00;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.22s cubic-bezier(0.22,1,0.36,1);
  }
  .nav-item:not(.active):hover::after { transform: scaleX(1); }
  .nav-item.active  { background: #c4ff00; color: #0a0a0a; }
  .nav-item.active::after { display: none; }
  .nav-item:not(.active) { color: #ededed; }

  /* ── LOGO ───────────────────────────────── */
  .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-dot { width: 14px; height: 14px; background: #c4ff00; transition: transform 0.2s; }
  .logo:hover .logo-dot { transform: scale(1.3) rotate(45deg); }
  .logo-name { font-size: 18px; letter-spacing: -0.01em; font-weight: 800; }
  .logo-ai   { font-size: 18px; color: #c4ff00; letter-spacing: -0.01em; font-weight: 800; transition: letter-spacing 0.2s; }
  .logo:hover .logo-ai { letter-spacing: 0.04em; }

  /* ── BUTTONS ────────────────────────────── */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    padding: 14px 22px; border: 2px solid #c4ff00;
    background: #c4ff00; color: #0a0a0a; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover  { background: #d4ff33; transform: translateY(-2px); }
  .btn-primary:active { transform: translateY(1px); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    padding: 14px 22px; border: 2px solid #ededed;
    background: transparent; color: #ededed; cursor: pointer;
    transition: border-color 0.15s, color 0.15s, transform 0.1s;
  }
  .btn-ghost:hover  { border-color: #c4ff00; color: #c4ff00; transform: translateY(-2px); }
  .btn-ghost:active { transform: translateY(1px); }

  .btn-dark {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
    padding: 14px 22px; border: 2px solid #0a0a0a;
    background: #0a0a0a; color: #c4ff00; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-dark:hover  { background: #1a1a1a; transform: translateY(-2px); }
  .btn-dark:active { transform: translateY(1px); }

  /* ── PROJECT ROW ────────────────────────── */
  .proj-row {
    display: grid;
    grid-template-columns: 64px 2fr 1.5fr 1fr 56px;
    align-items: center; padding: 26px 0;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background 0.2s, padding-left 0.25s cubic-bezier(0.22,1,0.36,1);
  }
  .proj-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: #c4ff00;
    transform: scaleY(0); transform-origin: bottom;
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
  }
  .proj-row:hover { background: #0f0f0f; padding-left: 10px; }
  .proj-row:hover::before { transform: scaleY(1); }
  .proj-row:hover .proj-num   { color: #c4ff00; transform: scale(1.1); }
  .proj-row:hover .proj-title { color: #c4ff00; }
  .proj-row:hover .proj-arrow { transform: translateX(8px); color: #c4ff00; }
  .proj-row:hover .proj-kind  { color: #ededed; }

  .proj-num   { font-size: 20px; font-weight: 800; color: #3a3a3a; transition: color 0.2s, transform 0.2s; }
  .proj-title { font-size: 30px; line-height: 0.95; font-weight: 800; letter-spacing: -0.03em; transition: color 0.2s; }
  .proj-sub   { font-size: 13px; color: #6b6b6b; margin-top: 5px; }
  .proj-kind  { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: #6b6b6b; transition: color 0.2s; }
  .proj-year  { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; color: #6b6b6b; }
  .proj-arrow { font-size: 20px; font-weight: 800; text-align: right; transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), color 0.2s; color: #3a3a3a; }

  /* ── SERVICE CARD ───────────────────────── */
  .svc-card {
    padding: 28px; border-right: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a;
    min-height: 220px; transition: background 0.2s;
    position: relative; overflow: hidden;
  }
  .svc-card:not(.acid)::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: #c4ff00;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .svc-card:not(.acid):hover::after { transform: scaleX(1); }
  .svc-card:not(.acid):hover { background: #0f0f0f; }
  .svc-card:not(.acid):hover .svc-code { transform: translateX(6px); color: #fff; }
  .svc-code { font-size: 52px; line-height: 1; font-weight: 800; letter-spacing: -0.03em; transition: transform 0.22s, color 0.2s; }

  /* ── STAT CARD ──────────────────────────── */
  .stat-card { padding: 32px 28px; transition: background 0.2s; cursor: default; }
  .stat-card:not(.acid):hover { background: #111; }
  .stat-num { transition: transform 0.2s; display: inline-block; }
  .stat-card:not(.acid):hover .stat-num { transform: scale(1.05); }

  /* ── AWARD CARD ─────────────────────────── */
  .award-card {
    padding: 24px 28px;
    border-right: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a;
    transition: background 0.2s, padding-left 0.22s;
    cursor: default;
  }
  .award-card:hover { background: #0f0f0f; padding-left: 36px; }
  .award-card:hover .award-year { color: #c4ff00; }
  .award-year { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #6b6b6b; margin-bottom: 8px; transition: color 0.2s; }

  /* ── SPEAKING ROW ───────────────────────── */
  .speak-row {
    display: grid; grid-template-columns: 48px 1fr 48px;
    align-items: center; padding: 22px 0;
    border-bottom: 1px solid #2a2a2a; cursor: default;
    transition: background 0.2s, padding-left 0.22s cubic-bezier(0.22,1,0.36,1);
  }
  .speak-row:hover { background: #0f0f0f; padding-left: 14px; }
  .speak-row:hover .speak-num  { color: #c4ff00; }
  .speak-row:hover .speak-text { color: #c4ff00; }
  .speak-row:hover .speak-arr  { transform: translateX(8px); color: #c4ff00; }
  .speak-num  { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #3a3a3a; transition: color 0.2s; }
  .speak-text { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; transition: color 0.2s; }
  .speak-arr  { font-size: 18px; font-weight: 800; text-align: right; transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), color 0.2s; color: #3a3a3a; }

  /* ── DETAIL TAGS ────────────────────────── */
  .detail-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
    padding: 5px 12px; background: #1e1e1e; color: #c4ff00;
    transition: background 0.15s, color 0.15s, transform 0.15s;
    cursor: default;
  }
  .detail-tag:hover { background: #c4ff00; color: #0a0a0a; transform: translateY(-3px); }

  /* ── CONTACT ROW ────────────────────────── */
  .contact-row {
    display: flex; justify-content: space-between;
    padding: 15px 0; border-bottom: 1px solid #1e1e1e;
    transition: padding-left 0.2s; cursor: default;
  }
  .contact-row:hover { padding-left: 10px; }
  .contact-row:hover .contact-val { color: #c4ff00; }
  .contact-key { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #6b6b6b; }
  .contact-val { font-size: 15px; color: #ededed; transition: color 0.2s; }

  /* ── STACK TAG ──────────────────────────── */
  .stack-tag {
    font-size: 13px; padding: 5px 12px;
    transition: transform 0.15s, background 0.15s, color 0.15s;
    cursor: default;
  }
  .stack-tag:hover { transform: translateY(-3px); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="data.js"></script>

  <script type="text/babel">
    const { useState } = React;
    const MONO = { fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", letterSpacing: "0.12em" };

    function Tag({ children, style = {} }) {
      return (
        <span style={{
          display: "inline-block", background: "#c4ff00", color: "#0a0a0a",
          ...MONO, fontSize: 11, fontWeight: 600, padding: "6px 10px 7px", ...style
        }}>{children}</span>
      );
    }

    function Topbar({ page, setPage }) {
      const PAGES = ["INDEX","TRABAJO","REALSTATE","SOBRE","CHARLAS","CONTACTO"];
      return (
        <header style={{ position: "sticky", top: 0, zIndex: 100, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 40px", borderBottom: "1px solid #2a2a2a", background: "#0a0a0a" }}>
          <div className="logo" onClick={() => setPage("INDEX")}>
            <div className="logo-dot"></div>
            <span className="logo-name">PUTRINO</span>
            <span className="logo-ai">.AI</span>
          </div>
          <nav style={{ display: "flex", gap: 2 }}>
            {PAGES.map(it => (
              <span key={it} className={`nav-item ${page === it ? "active" : ""}`} onClick={() => setPage(it)}>{it}</span>
            ))}
          </nav>
          <span style={{ ...MONO, fontSize: 11, color: "#6b6b6b" }}>FILE 001 / PORTFOLIO 2026</span>
        </header>
      );
    }

    function ProjectDetail({ project, onBack }) {
      return (
        <div className="detail-enter" style={{ padding: 40 }}>
          <div style={{ marginBottom: 48 }}>
            <span className="btn-ghost" onClick={onBack} style={{ fontSize: 12, padding: "10px 18px" }}>← VOLVER</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 64, marginBottom: 64 }}>
            <div>
              <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                <span style={{ ...MONO, fontSize: 10, color: "#c4ff00", background: "#1a1a1a", padding: "5px 12px" }}>{project.kind}</span>
                <span style={{ ...MONO, fontSize: 10, color: "#6b6b6b", background: "#1a1a1a", padding: "5px 12px" }}>{project.year}</span>
              </div>
              <div style={{ ...MONO, fontSize: 11, color: "#c4ff00", marginBottom: 14 }}>PROYECTO {project.n}</div>
              <h1 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.88, fontWeight: 800, letterSpacing: "-0.04em", marginBottom: 16 }}>
                {project.title}
              </h1>
              <p style={{ fontSize: 17, color: "#a8a8a8", lineHeight: 1.5 }}>{project.sub}</p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
              <div style={{ background: "#c4ff00", padding: "32px 36px" }}>
                <div style={{ ...MONO, fontSize: 9, color: "#0a0a0a", marginBottom: 12 }}>RESULTADO / STAT</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#0a0a0a", letterSpacing: "-0.02em", lineHeight: 1.2 }}>{project.stat}</div>
              </div>
            </div>
          </div>
          <div style={{ borderTop: "2px solid #2a2a2a", paddingTop: 48, marginBottom: 48 }}>
            <p style={{ fontSize: 22, lineHeight: 1.65, maxWidth: "58ch" }}>{project.blurb}</p>
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {project.tags.map(t => <span key={t} className="detail-tag">{t}</span>)}
          </div>
        </div>
      );
    }

    function PageIndex({ A, setPage }) {
      return (
        <div className="page-enter">
          <section style={{ position: "relative", padding: "64px 40px 56px", overflow: "hidden" }}>
            <svg style={{ position: "absolute", top: -40, right: -40, pointerEvents: "none", opacity: 0.7 }} width="320" height="320" viewBox="0 0 320 320">
              <line x1="180" y1="-20" x2="380" y2="220" stroke="#c4ff00" strokeWidth="1.5"/>
              <line x1="220" y1="-20" x2="420" y2="220" stroke="#c4ff00" strokeWidth="1" opacity="0.5"/>
              <line x1="260" y1="-20" x2="460" y2="220" stroke="#c4ff00" strokeWidth="1" opacity="0.25"/>
            </svg>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 28 }}>
              <Tag>MAGÍSTER EN IA · MENDOZA · 2026</Tag>
              <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 00 / INDEX</span>
            </div>
            <h1 style={{ fontSize: "clamp(80px, 13vw, 168px)", lineHeight: 0.86, letterSpacing: "-0.04em", fontWeight: 800, margin: 0 }}>
              AGUSTÍN<br/><span style={{ color: "#c4ff00" }}>PUTRINO.</span>
            </h1>
            <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 64, alignItems: "end", marginTop: 56 }}>
              <p style={{ fontSize: 22, lineHeight: 1.45, maxWidth: "44ch", margin: 0 }}>
                Construyo <span className="hl">sistemas de IA aplicada</span> sobre datos sensibles. On-premise. Trazables. En producción.
              </p>
              <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", flexWrap: "wrap" }}>
                <span className="btn-primary" onClick={() => setPage("TRABAJO")}>VER TRABAJO →</span>
                <span className="btn-ghost" onClick={() => setPage("CONTACTO")}>AGENDAR LLAMADA</span>
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 64, borderTop: "1px solid #2a2a2a", paddingTop: 16 }}>
              <span style={{ ...MONO, fontSize: 11, color: "#6b6b6b" }}>§00 — INDEX · MENDOZA AR ↔ REMOTO LATAM</span>
              <span style={{ ...MONO, fontSize: 11, color: "#6b6b6b" }}>SCROLL ↓</span>
            </div>
          </section>

          <section style={{ borderTop: "2px solid #2a2a2a", borderBottom: "2px solid #2a2a2a", display: "grid", gridTemplateColumns: "repeat(4, 1fr)" }}>
            {A.stats.map((s, i) => (
              <div key={i} className={`stat-card ${i === 1 ? "acid" : ""}`} style={{ borderRight: i < 3 ? "2px solid #2a2a2a" : "none", background: i === 1 ? "#c4ff00" : "transparent" }}>
                <div className="stat-num" style={{ fontSize: 56, lineHeight: 0.9, fontWeight: 800, letterSpacing: "-0.03em", color: i === 1 ? "#0a0a0a" : "#c4ff00" }}>{s.n}</div>
                <div style={{ ...MONO, marginTop: 14, fontSize: 11, color: i === 1 ? "#0a0a0a" : "#6b6b6b" }}>{s.l}</div>
              </div>
            ))}
          </section>

          <section style={{ padding: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 28, alignItems: "end" }}>
              <div>
                <Tag>QUÉ HAGO</Tag>
                <h2 style={{ fontSize: "clamp(48px, 6vw, 80px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                  SEIS <span className="hl">DISCIPLINAS.</span><br/>UN SOLO BUILDER.
                </h2>
              </div>
              <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 01 / SERVICIOS</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", border: "1px solid #2a2a2a", borderRight: "none", borderBottom: "none" }}>
              {A.services.map((it, i) => {
                const acid = i === 1;
                return (
                  <div key={it.code} className={`svc-card ${acid ? "acid" : ""}`} style={{ background: acid ? "#c4ff00" : "transparent" }}>
                    <div className="svc-code" style={{ color: acid ? "#0a0a0a" : "#c4ff00" }}>{it.code}</div>
                    <div style={{ ...MONO, fontSize: 11, marginTop: 8, color: acid ? "#0a0a0a" : "#6b6b6b" }}>{it.k}</div>
                    <div style={{ fontSize: 19, marginTop: 16, lineHeight: 1.15, fontWeight: 700, color: acid ? "#0a0a0a" : "#ededed" }}>{it.k}</div>
                    <p style={{ fontSize: 14, color: acid ? "#0a0a0a" : "#6b6b6b", marginTop: 8, lineHeight: 1.55 }}>{it.v}</p>
                  </div>
                );
              })}
            </div>
          </section>

          <section style={{ padding: "56px 40px", background: "#c4ff00" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ fontSize: "clamp(36px, 4vw, 56px)", lineHeight: 0.9, fontWeight: 800, letterSpacing: "-0.03em", color: "#0a0a0a" }}>
                ¿IA SOBRE TU DATO REAL?<br/>HABLEMOS.
              </h2>
              <span className="btn-dark" onClick={() => setPage("CONTACTO")}>CONTACTO →</span>
            </div>
          </section>
        </div>
      );
    }

    function PageTrabajo({ A }) {
      const [selected, setSelected] = useState(null);
      if (selected) return <ProjectDetail project={selected} onBack={() => setSelected(null)} />;
      return (
        <div className="page-enter" style={{ padding: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 40, alignItems: "end" }}>
            <div>
              <Tag>SELECCIÓN</Tag>
              <h2 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                PROYECTOS<br/><span className="hl">EN PRODUCCIÓN.</span>
              </h2>
            </div>
            <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 02 / TRABAJO</span>
          </div>
          <div style={{ borderTop: "2px solid #2a2a2a" }}>
            {A.projects.map(it => (
              <div key={it.id} className="proj-row" onClick={() => setSelected(it)}>
                <span className="proj-num">{it.n}</span>
                <div>
                  <div className="proj-title">{it.title}</div>
                  <div className="proj-sub">{it.sub}</div>
                </div>
                <span className="proj-kind">{it.kind}</span>
                <span className="proj-year">{it.year}</span>
                <span className="proj-arrow">→</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 72 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 28, alignItems: "end" }}>
              <div>
                <Tag>RECONOCIMIENTOS</Tag>
                <h3 style={{ fontSize: 48, lineHeight: 0.9, marginTop: 12, fontWeight: 800, letterSpacing: "-0.03em" }}>
                  PREMIOS &<br/><span className="hl">DISTINCIONES.</span>
                </h3>
              </div>
              <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 03 / AWARDS</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", border: "1px solid #2a2a2a", borderRight: "none", borderBottom: "none" }}>
              {A.awards.map((it, i) => (
                <div key={i} className="award-card">
                  <div className="award-year">{it.y}</div>
                  <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.3 }}>{it.k}</div>
                  <div style={{ fontSize: 13, color: "#6b6b6b", marginTop: 6 }}>{it.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PageSobre({ A }) {
      return (
        <div className="page-enter">
          <section style={{ padding: 40 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 40, alignItems: "end" }}>
              <div>
                <Tag>BIO</Tag>
                <h2 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                  QUIÉN<br/><span className="hl">SOY.</span>
                </h2>
              </div>
              <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 04 / SOBRE</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 64 }}>
              <div>
                <p style={{ fontSize: 20, lineHeight: 1.65 }}>{A.long}</p>
                <div style={{ marginTop: 32, display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {A.subroles.map(r => (
                    <Tag key={r} style={{ background: "transparent", color: "#c4ff00", border: "1px solid #c4ff00" }}>{r}</Tag>
                  ))}
                </div>
              </div>
              <div>
                <div style={{ ...MONO, fontSize: 10, color: "#c4ff00", marginBottom: 16 }}>EXPEDIENTE</div>
                {Object.entries(A.meta).map(([k, v]) => (
                  <div key={k} className="contact-row">
                    <span className="contact-key">{k}</span>
                    <span className="contact-val">{v}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>
          <section style={{ padding: "0 40px 72px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 28, alignItems: "end" }}>
              <div>
                <Tag>TECNOLOGÍAS</Tag>
                <h3 style={{ fontSize: 48, lineHeight: 0.9, marginTop: 12, fontWeight: 800, letterSpacing: "-0.03em" }}>
                  STACK<br/><span className="hl">TÉCNICO.</span>
                </h3>
              </div>
              <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 05 / STACK</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", border: "1px solid #2a2a2a", borderRight: "none", borderBottom: "none" }}>
              {Object.entries(A.stack).map(([cat, items], i) => (
                <div key={cat} style={{ padding: "24px 28px", borderRight: "1px solid #2a2a2a", borderBottom: "1px solid #2a2a2a", background: i === 0 ? "#c4ff00" : "transparent" }}>
                  <div style={{ ...MONO, fontSize: 11, fontWeight: 700, color: i === 0 ? "#0a0a0a" : "#c4ff00", marginBottom: 14 }}>{cat}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {items.map(it => (
                      <span key={it} className="stack-tag" style={{ color: i === 0 ? "#0a0a0a" : "#ededed", background: i === 0 ? "rgba(0,0,0,0.12)" : "#1a1a1a" }}>{it}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </section>
        </div>
      );
    }

    function PageCharlas({ A, setPage }) {
      return (
        <div className="page-enter" style={{ padding: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 40, alignItems: "end" }}>
            <div>
              <Tag>SPEAKER</Tag>
              <h2 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                CHARLAS &<br/><span className="hl">PONENCIAS.</span>
              </h2>
            </div>
            <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 06 / CHARLAS</span>
          </div>
          <div style={{ borderTop: "2px solid #2a2a2a" }}>
            {A.speaking.map((it, i) => (
              <div key={i} className="speak-row">
                <span className="speak-num">{String(i + 1).padStart(2, "0")}</span>
                <span className="speak-text">{it}</span>
                <span className="speak-arr">→</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 64, background: "#c4ff00", padding: "40px 48px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ ...MONO, fontSize: 10, color: "#0a0a0a", marginBottom: 8 }}>¿QUERÉS INVITARME?</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#0a0a0a", letterSpacing: "-0.02em" }}>Hablemos del evento.</div>
            </div>
            <span className="btn-dark" onClick={() => setPage("CONTACTO")}>CONTACTAR →</span>
          </div>
        </div>
      );
    }

    function PageContacto({ A }) {
      return (
        <div className="page-enter" style={{ padding: "64px 40px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 56, alignItems: "end" }}>
            <div>
              <Tag>CONTACTO</Tag>
              <h2 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                ¿IA SOBRE TU<br/>DATO REAL?<br/><span className="hl">HABLEMOS.</span>
              </h2>
            </div>
            <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 07 / CONTACTO</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48 }}>
            <div style={{ border: "1px solid #2a2a2a", padding: 40 }}>
              <div style={{ ...MONO, fontSize: 10, color: "#c4ff00", marginBottom: 24 }}>CONTACTO DIRECTO</div>
              {[
                { k: "EMAIL",    v: A.email },
                { k: "TELÉFONO", v: A.phone },
                { k: "CIUDAD",   v: A.city },
                { k: "LINKEDIN", v: A.linkedin },
                { k: "HANDLE",   v: A.handle },
              ].map(({ k, v }) => (
                <div key={k} className="contact-row">
                  <span className="contact-key">{k}</span>
                  <span className="contact-val">{v}</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ background: "#c4ff00", padding: 36, flex: 1 }}>
                <div style={{ ...MONO, fontSize: 10, color: "#0a0a0a", marginBottom: 14 }}>PROYECTOS IA ON-PREMISE</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: "#0a0a0a", letterSpacing: "-0.02em", lineHeight: 1.3 }}>
                  Implementación en tu organización. Sin mandar tus datos a la nube.
                </div>
              </div>
              <div
                style={{ background: "#111", padding: 36, border: "1px solid #2a2a2a", flex: 1, transition: "border-color 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "#c4ff00"}
                onMouseLeave={e => e.currentTarget.style.borderColor = "#2a2a2a"}
              >
                <div style={{ ...MONO, fontSize: 10, color: "#c4ff00", marginBottom: 14 }}>FORMACIÓN & CONSULTORÍA</div>
                <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", lineHeight: 1.3 }}>
                  Capacitaciones a medida para tu equipo.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const REIT_VIDEOS = [
      { file: "assets/videos/reit-01.mp4", label: "DEMO 01" },
      { file: "assets/videos/reit-02.mp4", label: "DEMO 02" },
      { file: "assets/videos/reit-03.mp4", label: "DEMO 03" },
      { file: "assets/videos/reit-04.mp4", label: "DEMO 04" },
      { file: "assets/videos/reit-05.mp4", label: "DEMO 05" },
    ];

    function PageRealState() {
      const [active, setActive] = React.useState(0);
      return (
        <div className="page-enter" style={{ padding: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 40, alignItems: "end" }}>
            <div>
              <Tag>DEMOS</Tag>
              <h2 style={{ fontSize: "clamp(56px, 7vw, 96px)", lineHeight: 0.9, marginTop: 16, fontWeight: 800, letterSpacing: "-0.03em" }}>
                REAL ESTATE<br/><span className="hl">INTELLIGENCE.</span>
              </h2>
            </div>
            <span style={{ ...MONO, color: "#6b6b6b", fontSize: 12 }}>§ 08 / REALSTATE</span>
          </div>

          {/* Player principal */}
          <div style={{ position: "relative", background: "#000", border: "2px solid #2a2a2a" }}>
            <video
              key={active}
              src={REIT_VIDEOS[active].file}
              controls
              autoPlay
              muted
              loop
              style={{ width: "100%", display: "block", maxHeight: 560, objectFit: "contain" }}
            />
            <div style={{ position: "absolute", top: 12, left: 12, background: "#c4ff00", padding: "4px 12px", ...MONO, fontSize: 11, fontWeight: 700, color: "#0a0a0a" }}>
              {REIT_VIDEOS[active].label}
            </div>
          </div>

          {/* Selector de videos */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", borderLeft: "2px solid #2a2a2a", borderBottom: "2px solid #2a2a2a", borderRight: "2px solid #2a2a2a" }}>
            {REIT_VIDEOS.map((v, i) => (
              <div
                key={i}
                onClick={() => setActive(i)}
                style={{
                  padding: "18px 20px",
                  borderRight: i < 4 ? "1px solid #2a2a2a" : "none",
                  background: active === i ? "#c4ff00" : "#0a0a0a",
                  cursor: "pointer",
                  transition: "background 0.15s",
                  display: "flex", alignItems: "center", gap: 10,
                }}
              >
                <span style={{ fontSize: 18, color: active === i ? "#0a0a0a" : "#c4ff00" }}>▶</span>
                <span style={{ ...MONO, fontSize: 11, fontWeight: 700, color: active === i ? "#0a0a0a" : "#a8a8a8" }}>{v.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const hashPage = () => (window.location.hash.replace("#","").toUpperCase() || "INDEX");
      const [page, setPage] = useState(hashPage);
      const A = window.AGUS;
      const nav = (p) => {
        window.location.hash = p;
        window.scrollTo({ top: 0, behavior: "smooth" });
        setPage(p);
      };
      React.useEffect(() => {
        const onHash = () => setPage(hashPage());
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);
      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0a" }}>
          <Topbar page={page} setPage={nav} />
          <main style={{ maxWidth: 1280, margin: "0 auto" }}>
            {page === "INDEX"    && <PageIndex    A={A} setPage={nav} />}
            {page === "TRABAJO"   && <PageTrabajo   A={A} />}
            {page === "REALSTATE" && <PageRealState />}
            {page === "SOBRE"     && <PageSobre     A={A} />}
            {page === "CHARLAS"  && <PageCharlas  A={A} setPage={nav} />}
            {page === "CONTACTO" && <PageContacto A={A} />}
          </main>
          <footer style={{ borderTop: "1px solid #2a2a2a", padding: "20px 40px", display: "flex", justifyContent: "space-between", maxWidth: 1280, margin: "0 auto" }}>
            <span style={{ ...MONO, fontSize: 10, color: "#3a3a3a" }}>AGUSTÍN PUTRINO — MENDOZA AR — 2026</span>
            <span style={{ ...MONO, fontSize: 10, color: "#3a3a3a" }}>IA APLICADA · ON-PREMISE · LATAM</span>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.btn { display:inline-flex; align-items:center; gap:10px; font-family:'JetBrains Mono', monospace; font-size:13px; text-transform:uppercase; letter-spacing:0.12em; font-weight:600; padding:12px 18px; border-radius:0; cursor:crosshair; text-decoration:none; transition: all 100ms linear; }
.btn-primary { background:#c4ff00; color:#0a0a0a; border:2px solid #0a0a0a; }
.btn-primary:hover { background:#0a0a0a; color:#c4ff00; }
.btn-ghost { background:transparent; color:#ededed; border:2px solid #ededed; }
.btn-ghost:hover { background:#ededed; color:#0a0a0a; }
.btn-arrow::after { content:"→"; }
</style></head>
<body><div class="card">
  <div class="mono" style="color:#c4ff00; margin-bottom:14px">BUTTONS / HARD RECT · 0 RADIUS · 2PX BORDER</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <button class="btn btn-primary btn-arrow">PRIMARY</button>
    <button class="btn btn-ghost btn-arrow">GHOST</button>
    <button class="btn btn-primary" style="padding:8px 14px; font-size:11px;">SMALL</button>
    <button class="btn btn-ghost" disabled style="opacity:0.4; cursor:not-allowed;">DISABLED</button>
  </div>
  <div class="mono" style="color:#6b6b6b; margin-top:14px; font-size:10px;">HOVER = INVERT FG/BG · ACTIVE = TRANSLATE 2PX · NO TRANSITIONS ON COLOR, JUST SNAP</div>
</div></body></html>

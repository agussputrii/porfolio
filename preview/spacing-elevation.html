<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono" style="color:#c4ff00; margin-bottom:14px">ELEVATION / NO SHADOWS. BORDER + COLOR ONLY.</div>
  <div class="row">
    <div style="flex:1; background:#0a0a0a; border:1px solid #2a2a2a; padding:18px; min-height:90px;">
      <div class="mono" style="font-size:10px; color:#a8a8a8;">LEVEL 0</div>
      <div class="display" style="font-size:18px; margin-top:8px;">FLAT / 1PX</div>
    </div>
    <div style="flex:1; background:#0a0a0a; border:2px solid #ededed; padding:18px; min-height:90px;">
      <div class="mono" style="font-size:10px; color:#a8a8a8;">LEVEL 1</div>
      <div class="display" style="font-size:18px; margin-top:8px;">CARD / 2PX</div>
    </div>
    <div style="flex:1; background:#c4ff00; border:2px solid #0a0a0a; padding:18px; min-height:90px; box-shadow: 6px 6px 0 0 #ededed;">
      <div class="mono" style="font-size:10px; color:#0a0a0a;">LEVEL 2</div>
      <div class="display" style="font-size:18px; margin-top:8px; color:#0a0a0a;">PRESS / OFFSET</div>
    </div>
  </div>
</div></body></html>

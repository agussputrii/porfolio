<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#0a0a0a; padding:24px; position:relative; overflow:hidden;">
  <div class="mono" style="color:#c4ff00; margin-bottom:14px">LOGO / WORDMARK + MARK</div>
  <div style="display:flex; gap:24px; align-items:center;">
    <div style="background:#0a0a0a; padding:16px; display:flex; align-items:center; gap:10px;">
      <div style="width:18px; height:18px; background:#c4ff00;"></div>
      <span class="display" style="font-size:24px; color:#ededed;">BRUTAL</span>
      <span class="display" style="font-size:24px; color:#c4ff00;">.DIGITAL</span>
    </div>
    <div style="width:64px; height:64px; background:#0a0a0a; position:relative;">
      <div style="position:absolute; inset:8px; background:#c4ff00;"></div>
      <div style="position:absolute; inset:18px; background:#0a0a0a;"></div>
    </div>
    <div style="background:#c4ff00; padding:8px;">
      <div style="display:flex; align-items:center; gap:6px;">
        <div style="width:14px; height:14px; background:#0a0a0a;"></div>
        <span class="display" style="font-size:18px; color:#0a0a0a;">B.D</span>
      </div>
    </div>
  </div>
</div></body></html>

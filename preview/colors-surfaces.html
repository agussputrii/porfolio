<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono" style="color:#c4ff00; margin-bottom:14px">CORE SURFACES</div>
  <div class="row">
    <div style="flex:1; background:#0a0a0a; border:2px solid #ededed; padding:18px; min-height:120px;">
      <div class="mono" style="color:#ededed; font-size:11px;">DARK</div>
      <div class="display" style="color:#ededed; font-size:24px; margin-top:30px;">#0A0A0A</div>
      <div class="mono" style="color:#a8a8a8; font-size:10px; margin-top:6px;">PRIMARY · NEAR-BLACK</div>
    </div>
    <div style="flex:1; background:#c4ff00; padding:18px; min-height:120px;">
      <div class="mono" style="color:#0a0a0a; font-size:11px;">ACID</div>
      <div class="display" style="color:#0a0a0a; font-size:24px; margin-top:30px;">#C4FF00</div>
      <div class="mono" style="color:#0a0a0a; font-size:10px; margin-top:6px; opacity:0.7;">ACCENT · LIME</div>
    </div>
    <div style="flex:1; background:#ededed; padding:18px; min-height:120px;">
      <div class="mono" style="color:#0a0a0a; font-size:11px;">LIGHT</div>
      <div class="display" style="color:#0a0a0a; font-size:24px; margin-top:30px;">#EDEDED</div>
      <div class="mono" style="color:#0a0a0a; font-size:10px; margin-top:6px; opacity:0.6;">RARE · OFF-WHITE</div>
    </div>
  </div>
</div></body></html>

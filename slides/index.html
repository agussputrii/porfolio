<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BRUTAL.DIGITAL — Slide Templates</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1a1a1a; color: #ededed; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 32px; max-width: 1280px; margin: 0 auto; }
  .slide-wrap { width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden; }
  .slide-label { font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; color: #6b6b6b; margin-bottom: 8px; }
  .slide { position: absolute; inset: 0; padding: 80px 96px; box-sizing: border-box; }
  .slide-dark { background: #0a0a0a; color: #ededed; }
  .slide-acid { background: #c4ff00; color: #0a0a0a; }
  .slide-light { background: #ededed; color: #0a0a0a; }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .footer { position: absolute; left: 96px; right: 96px; bottom: 64px; display: flex; justify-content: space-between; }
  .square { width: 14px; height: 14px; background: #c4ff00; display: inline-block; margin-right: 10px; vertical-align: middle; }
  .display-xl { font-family: 'Archivo Black', Impact, sans-serif; text-transform: uppercase; letter-spacing: -0.025em; line-height: 0.88; font-size: 144px; }
  .display-l { font-family: 'Archivo Black', Impact, sans-serif; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.9; font-size: 96px; }
  .display-m { font-family: 'Archivo Black', Impact, sans-serif; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.95; font-size: 56px; }
  .mono-cap { font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.12em; font-size: 14px; }
  .tag-acid { background: #c4ff00; color: #0a0a0a; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.12em; font-weight: 600; text-transform: uppercase; display: inline-block; }
  .hl-acid { background: #c4ff00; color: #0a0a0a; padding: 0 0.18em 0.05em; }
  .hl-ink { background: #0a0a0a; color: #c4ff00; padding: 0 0.18em 0.05em; }
</style>
</head>
<body data-screen-label="Slides Kit">
  <div class="grid" id="kit"></div>
  <script>
    const slides = [
      { id: "cover", label: "01 / COVER" },
      { id: "definition", label: "02 / DEFINITION" },
      { id: "steps", label: "03 / STEPS" },
      { id: "families", label: "04 / FAMILIES (LIGHT)" },
      { id: "stat", label: "05 / BIG STAT (ACID)" },
      { id: "quote", label: "06 / QUOTE" },
      { id: "trajectories", label: "07 / TRAJECTORIES (LIGHT)" },
      { id: "end", label: "08 / END" },
    ];
    const root = document.getElementById('kit');
    slides.forEach(s => {
      const div = document.createElement('div');
      div.innerHTML = `<div class="slide-label">${s.label}</div>
        <div class="slide-wrap"><iframe src="${s.id}.html" style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe></div>`;
      root.appendChild(div);
    });
  </script>
</body>
</html>

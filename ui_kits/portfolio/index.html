<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENLAYERS AI</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { background: #0a0a0a; color: #ededed; }
  .app { max-width: 1280px; margin: 0 auto; }
</style>
</head>
<body data-screen-label="01 Portfolio Kit">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="ProjectIndex.jsx"></script>
  <script type="text/babel" src="CaseStudy.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="NotFound.jsx"></script>
  <script type="text/babel" src="Servicios.jsx"></script>
  <script type="text/babel" src="Precios.jsx"></script>
  <script type="text/babel" src="Catalogo.jsx"></script>
  <script type="text/babel" src="Suscripciones.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [route, setRoute] = useState("home");
      const [caseId, setCaseId] = useState("altavoz");
      const openCase = (id) => { setCaseId(id); setRoute("case"); };

      return (
        <div className="app">
          <Topbar route={route} setRoute={setRoute} />
          {route === "home" && (
            <>
              <Hero setRoute={setRoute} />
              <ServicesGrid />
              <FeaturedWork setRoute={setRoute} openCase={openCase} />
            </>
          )}
          {route === "projects" && <ProjectIndex openCase={openCase} />}
          {route === "work" && <ProjectIndex openCase={openCase} />}
          {route === "case" && <CaseStudy caseId={caseId} setRoute={setRoute} />}
          {route === "about" && <About setRoute={setRoute} />}
          {route === "contacto" && <Contact />}
          {route === "servicios" && <Servicios />}
          {route === "precios" && <Precios />}
          {route === "catalogo" && <Catalogo />}
          {route === "suscripciones" && <Suscripciones />}
          {route === "404" && <NotFound setRoute={setRoute} />}
          <Footer setRoute={setRoute} />
          <div style={{ position: "fixed", bottom: 16, right: 16, display: "flex", gap: 6, zIndex: 100 }}>
            <button onClick={() => setRoute("404")} className="mono" style={{
              background: "#0a0a0a", color: "#6b6b6b", border: "1px solid #2a2a2a",
              padding: "6px 10px", fontSize: 10, fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: "0.12em", cursor: "crosshair",
            }}>VIEW 404</button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"></feTurbulence><feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.92  0 0 0 0 0.92  0 0 0 0.08 0"></feColorMatrix></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0a0a0a"></rect>
  <rect width="100%" height="100%" fill="url(#grid)"></rect>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.5"></rect>
  <line x1="700" y1="-50" x2="900" y2="200" stroke="#c4ff00" stroke-width="2"></line>
  <line x1="730" y1="-50" x2="930" y2="200" stroke="#c4ff00" stroke-width="2"></line>
  <line x1="760" y1="-50" x2="960" y2="200" stroke="#c4ff00" stroke-width="2"></line>
</svg>